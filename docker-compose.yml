

services:
  # Backend (server) service
  server:
    build:
      context: ./server
      dockerfile: DockerFile
    container_name: backend
    ports:
      - "3001:3001"
    env_file: ./server/.env
    #environment:
      #- DATABASE_URI=${DATABASE_URI}
    

  # Frontend (client) service
  client:
    build:
      context: ./client
      dockerfile: DockerFile
    container_name: frontend
    ports:
      - "5173:5173"
    depends_on:
      - server
